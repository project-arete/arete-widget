# Propagate Sender — server role of cp:padi.test.propagate.
# One propagated and one non-propagated property on each side, plus a
# ping/pong pair — the faceplate makes the propagate flag's effect visible.
# NOTE: invalid until padi.test.propagate is registered at cp.padi.io (by design).
widget: propagate-sender
title: Propagate Sender
description: Provider side of the propagate test rig - writes a propagated and a non-propagated property, pings receivers, and shows exactly what comes back (and what cannot).
icon: "📤"
color: "#3ecf8e"

capabilities:
  - profile: padi.test.propagate
    role: provider

view:
  - type: label
    text: you write
  - type: field
    bind: sShared
    caption: sShared — propagated, receivers see this
  - type: field
    bind: sLocal
    caption: sLocal — NOT propagated, never leaves this node
  - type: stepper
    bind: sPing
    min: 0
    caption: sPing — receivers auto-echo to cPong
  - type: split
  - type: label
    text: back from receivers
  - type: value
    bind: cShared
    caption: cShared — propagated
  - type: value
    bind: cPong
    caption: cPong — the echo of sPing
  - type: label
    text: (receivers also write cLocal — no propagate flag, so it can never appear here)

behavior:
  init:
    sShared: hello
    sLocal: this value never leaves the sender
    sPing: "0"
