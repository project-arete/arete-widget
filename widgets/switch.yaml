# Virtual Switch — a controller for cp:padi.light (provider role).
# The registry (cp.padi.io/profiles/padi.light) defines:
#   server (provider / controller) writes: sOut ("1"=on, "0"=off), sLabel
#   client (consumer / light)      writes: cState, cLabel
widget: switch
title: Virtual Switch
description: A controller. Flip the toggle to command any connected light; the light reports back on cState.

capabilities:
  - profile: padi.light
    role: provider

view:
  - type: toggle
    bind: sOut          # interactive — flipping it puts sOut
    on: "1"
    off: "0"
    caption: power
  - type: field
    bind: sLabel
    caption: switch label
  - type: lamp
    bind: cState        # glows when the light CONFIRMS it is on
    on: "1"
  - type: value
    bind: cState
    caption: light reports

behavior:
  init:
    sOut: "0"
    sLabel: Virtual Switch
