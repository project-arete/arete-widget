# Realm Simulator — provider of cp:padi.test.realm.info (dev-namespace TEST CP).
# Plays the realm/orchestrator side so the Realm Dashboard has something to
# consume until the real orchestrator publishes this itself. Turn the knobs
# and watch the dashboard follow. Init values paint a plausible realm the
# moment the pair binds. Property set (2026-07-24) matches the real CNS-
# exposable metrics: version, uptime, keys, rate, load + the cumulative
# reads/writes/updates/errors counters.
widget: realm-sim
title: Realm Simulator
description: Pretends to be the realm - publishes version, uptime, keys, busyness and the read/write/update/error counters on cp:padi.test.realm.info so the Realm Dashboard prototype has live data to show.
icon: "🛠"
color: "#2196f3"

capabilities:
  - profile: padi.test.realm.info
    role: provider

view:
  - type: label
    text: publish realm facts
  - type: field
    bind: version
    caption: CNS version
  - type: stepper
    bind: uptime
    min: 0
    step: 1
    caption: uptime (hours)
  - type: stepper
    bind: keys
    min: 0
    step: 50
    caption: keys held
  - type: stepper
    bind: load
    min: 0
    max: 10
    step: 1
    caption: busyness (0-10)
  - type: stepper
    bind: rate
    min: 0
    step: 10
    caption: message rate (msg/min)
  - type: split
  - type: label
    text: realm counters
  - type: stepper
    bind: reads
    min: 0
    step: 10
    caption: reads
  - type: stepper
    bind: writes
    min: 0
    step: 10
    caption: writes
  - type: stepper
    bind: updates
    min: 0
    step: 10
    caption: updates
  - type: stepper
    bind: errors
    min: 0
    step: 1
    caption: errors

behavior:
  init:
    version: "0.1.6"
    uptime: "1"
    keys: "294"
    load: "3"
    rate: "40"
    reads: "1"
    writes: "101"
    updates: "147"
    errors: "0"
