# Lease Tenant — client role of cp:padi.lease.basic ("Simple leasing profile"),
# plus server role of cp:padi.lease.info: as the lease holder, the tenant
# publishes its signage details (name/contact/space) on a second connection.
widget: lease-tenant
title: Lease Tenant
description: Proposes a lease - who you are, the rent you offer, and the end date - watches the landlord's terms and the lease status, and publishes the holder's signage info (name, contact, space) for information consumers.
icon: "🔑"
color: "#f5b34c"

capabilities:
  - profile: padi.lease.basic
    role: consumer
  - profile: padi.lease.info
    role: provider

view:
  - type: label
    text: your proposal
  - type: field
    bind: tenant
    caption: tenant name
  - type: stepper
    bind: rent
    min: 0
    step: 100
    caption: rent offered (USD/month)
  - type: date
    bind: end
    caption: lease end date
  - type: field
    bind: logo
    caption: logo URL (800x400)
  - type: split
  - type: label
    text: the landlord's terms
  - type: value
    bind: rate
    caption: rate (per SqFt)
  - type: value
    bind: capacity
    caption: capacity (people)
  - type: options
    bind: status
    values: [Interest, Offer, Accept, Decline, Approved, Delinquent, Terminated]
    caption: lease status
  - type: split
  - type: label
    text: your signage info
  - type: field
    bind: name
    caption: lease holder name (nameplate)
  - type: field
    bind: contact
    caption: contact phone
  - type: field
    bind: space
    caption: space name (displays)
  - type: value
    bind: id
    caption: lease id desired (from consumer)
