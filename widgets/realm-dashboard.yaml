# Realm Dashboard — consumer of cp:padi.test.realm.info (dev-namespace TEST
# CP on cp.padi.io). The user-perspective exploration of "About the realm":
# what the realm publishes about itself. Property set (2026-07-24) tracks what
# CNS actually exposes: version, uptime, keys, a msg-rate, a busyness gauge,
# and the real cumulative counters (reads/writes/updates/errors).
widget: realm-dashboard
title: Realm Dashboard
description: About the realm, from the realm itself - version, uptime, keys held, how busy it is, and the realm's read/write/update/error counters. Consumer of cp:padi.test.realm.info.
icon: "📊"
color: "#2196f3"

capabilities:
  - profile: padi.test.realm.info
    role: consumer

view:
  - type: label
    text: about this realm
  - type: value
    bind: version
    caption: CNS version
  - type: value
    bind: uptime
    caption: uptime (hours)
  - type: value
    bind: keys
    caption: keys held
  - type: meter
    bind: load
    min: 0
    max: 10
    caption: busyness (0 idle · 10 saturated)
  - type: value
    bind: rate
    caption: message rate (msg/min)
  - type: split
  - type: label
    text: realm counters
  - type: value
    bind: reads
    caption: reads
  - type: value
    bind: writes
    caption: writes
  - type: value
    bind: updates
    caption: updates
  - type: value
    bind: errors
    caption: errors
