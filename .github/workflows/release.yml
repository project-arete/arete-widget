# Build installers for macOS / Windows / Linux and attach them to a GitHub
# Release. Triggered by pushing a version tag (v1.2.3) — or run manually from
# the Actions tab (manual runs produce a draft release).
#
# npm ci runs the postinstall SDK patches, so CI builds carry the same
# arete-sdk fixes (off-Pi system-id, ws keepalive, clean-close retry) as dev.
#
# The two mac architectures build in SEPARATE jobs. arm64 builds on
# macos-latest (Apple silicon); x64 builds on macos-13, the last Intel
# runner — building an x64 app and mounting its DMG NATIVELY avoids the
# cross-arch `hdiutil detach` race that fails post-publish cleanup when an
# x64 DMG is mounted on an arm64 host. The asset still uploads before the
# detach, but the native runner keeps the job green.
name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac --arm64
          - os: macos-13
            args: --mac --x64
          - os: windows-latest
            args: --win
          - os: ubuntu-latest
            args: --linux
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Spotlight indexes the mounted DMG volume and keeps it busy, making
      # electron-builder's `hdiutil detach` fail. Disable indexing up front.
      - name: Disable Spotlight indexing (mac DMG detach flake)
        if: runner.os == 'macOS'
        run: sudo mdutil -a -i off || true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build and publish installers
        shell: bash
        run: |
          if npx electron-builder ${{ matrix.args }} --publish always; then exit 0; fi
          echo "First attempt failed — force-detaching stale DMG volumes and retrying once..."
          if [ "$RUNNER_OS" = "macOS" ]; then
            for v in /Volumes/Arete*; do sudo hdiutil detach -force "$v" 2>/dev/null || true; done
          fi
          npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Builds are unsigned (same as local dev builds) — stop electron-builder
          # from hunting for signing identities on the runners.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
